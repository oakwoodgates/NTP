# Trader services (single + multi-instrument) all share the same image, env_file,
# infra deps, restart policy, and logging. Anchor + merge avoids duplicating
# this in each service block.
x-trader-common: &trader-common
  build: .
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

# Environment overrides every trader needs (Docker DNS names for infra +
# Postgres/Redis ports + Redis auth). Compose `environment:` shadows
# `env_file:`, so these stay in YAML rather than .env.
x-trader-env: &trader-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD}

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    # Bind ONLY to the loopback interface. Docker's iptables manipulation
    # bypasses UFW: a bare "5434:5432" mapping exposes Postgres to the
    # public internet even when UFW says only 22 and 3000 are allowed.
    # See https://github.com/docker/for-linux/issues/690.
    # If you need external psql access from your laptop, SSH-tunnel:
    #     ssh -L 5434:127.0.0.1:5434 root@<droplet>
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nautilus_platform}
      POSTGRES_USER: ${POSTGRES_USER:-nautilus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nautilus_dev}
    # MOUNT TARGET MUST MATCH THE IMAGE'S PGDATA ENV VAR.
    # timescale/timescaledb:2.17.2-pg16 sets PGDATA=/var/lib/postgresql/data
    # (verified inside the running container with `docker exec ntp-postgres-1
    #  env | grep PGDATA`). Older timescale images used /home/postgres/pgdata/data
    # — if you ever bump the image, re-verify PGDATA and update this target.
    #
    # If the target doesn't match, Postgres writes data to its container
    # writable layer instead of the named volume. Every container removal
    # (any `docker compose down`) silently destroys the database. This bug
    # was latent in this repo from May 15 → May 22 2026 and cost us
    # six days of paper-trade history when the hardening PR's recreate
    # finally tripped it.
    #
    # Regression test in tests/unit/test_compose_pgdata_mount.py asserts
    # this invariant.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nautilus} -d ${POSTGRES_DB:-nautilus_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Same loopback-bind reason as postgres above. Plus: require a password.
    # Without `requirepass`, an unauthenticated attacker who reaches port
    # 6379 can delete keys, write arbitrary values, and attempt the
    # `CONFIG SET dir + SAVE` cron-write exploit (which one DID try on
    # 2026-05-22 — see commit log + reports/restart_tests/).
    # Container isolation prevented the cron-write step but the keys
    # being deleted broke NT's strategy save/load until the next clean
    # restart. Never again.
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      # `redis-cli ping` needs the password too.
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_DB: ${POSTGRES_DB:-nautilus_platform}
      POSTGRES_USER: ${POSTGRES_USER:-nautilus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nautilus_dev}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    # Grafana also gets loopback-bind by default. Two access patterns:
    # 1) SSH tunnel from your laptop (recommended):
    #      ssh -L 3000:127.0.0.1:3000 root@<droplet>
    #    then open http://localhost:3000 locally.
    # 2) Public exposure (if you really want it): set GRAFANA_BIND=0.0.0.0
    #    in .env on the droplet, AND set a strong GRAFANA_PASSWORD,
    #    AND consider putting Grafana behind an HTTPS reverse proxy.
    #    Default is loopback-bind — safer-by-default.
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # Single-instrument trader (legacy default). Strategy + instrument come
  # straight from .env. Now profile-gated: `docker compose up -d` runs only
  # infra; use `--profile single` to start this trader, or one of the
  # per-instrument profiles below for multi-instrument verification.
  trader:
    <<: *trader-common
    environment:
      <<: *trader-env
      # TRADING_SCRIPT, STRATEGY, INSTRUMENT_ID, MA_FAST/SLOW/TYPE, etc. all
      # come from .env. No per-service overrides here.
    profiles: ["single"]

  # ── Multi-instrument trader topology ───────────────────────────────────────
  # Three trader containers, one per instrument. Each reads its strategy +
  # instrument config from a per-service env file (`.env.{asset}`) which is
  # gitignored. Templates at `.env.{asset}.example` show what to fill in;
  # actual values stay on the deploy host only.
  #
  # Launch individually (`--profile eth`) or all at once (`--profile multi`).
  # Each container has a distinct TRADER_ID so PG strategy_runs rows + NT
  # MessageBus strategy-id topics don't collide between containers.
  #
  # If `.env.{asset}` doesn't exist on the host, compose will fail loudly at
  # `up` time — that's intentional: better than silently using `.env` defaults
  # and trading the wrong instrument.

  trader-eth:
    <<: *trader-common
    profiles: ["eth", "multi"]
    env_file:
      - path: .env
        required: true
      - path: .env.eth
        required: true
    environment:
      <<: *trader-env
      TRADER_ID: trader-eth

  trader-btc:
    <<: *trader-common
    profiles: ["btc", "multi"]
    env_file:
      - path: .env
        required: true
      - path: .env.btc
        required: true
    environment:
      <<: *trader-env
      TRADER_ID: trader-btc

  trader-sol:
    <<: *trader-common
    profiles: ["sol", "multi"]
    env_file:
      - path: .env
        required: true
      - path: .env.sol
        required: true
    environment:
      <<: *trader-env
      TRADER_ID: trader-sol

volumes:
  pgdata:
  redisdata:
  grafana_data:
