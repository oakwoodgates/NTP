# Trader services (single + multi-instrument) all share the same image, env_file,
# infra deps, restart policy, and logging. Anchor + merge avoids duplicating
# this in each service block.
x-trader-common: &trader-common
  build: .
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

# Environment overrides every trader needs (Docker DNS names for infra +
# Postgres/Redis ports). Compose `environment:` shadows `env_file:`, so these
# stay in YAML rather than .env.
x-trader-env: &trader-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nautilus_platform}
      POSTGRES_USER: ${POSTGRES_USER:-nautilus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nautilus_dev}
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nautilus} -d ${POSTGRES_DB:-nautilus_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_DB: ${POSTGRES_DB:-nautilus_platform}
      POSTGRES_USER: ${POSTGRES_USER:-nautilus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nautilus_dev}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # Single-instrument trader (legacy default). Strategy + instrument come
  # straight from .env. Now profile-gated: `docker compose up -d` runs only
  # infra; use `--profile single` to start this trader, or one of the
  # per-instrument profiles below for multi-instrument verification.
  trader:
    <<: *trader-common
    environment:
      <<: *trader-env
      # TRADING_SCRIPT, STRATEGY, INSTRUMENT_ID, MA_FAST/SLOW/TYPE, etc. all
      # come from .env. No per-service overrides here.
    profiles: ["single"]

  # ── Multi-instrument trader topology ───────────────────────────────────────
  # Three trader containers, one per instrument. Each reads its strategy +
  # instrument config from a per-service env file (`.env.{asset}`) which is
  # gitignored. Templates at `.env.{asset}.example` show what to fill in;
  # actual values stay on the deploy host only.
  #
  # Launch individually (`--profile eth`) or all at once (`--profile multi`).
  # Each container has a distinct TRADER_ID so PG strategy_runs rows + NT
  # MessageBus strategy-id topics don't collide between containers.
  #
  # If `.env.{asset}` doesn't exist on the host, compose will fail loudly at
  # `up` time — that's intentional: better than silently using `.env` defaults
  # and trading the wrong instrument.

  trader-eth:
    <<: *trader-common
    profiles: ["eth", "multi"]
    env_file:
      - path: .env
        required: true
      - path: .env.eth
        required: true
    environment:
      <<: *trader-env
      TRADER_ID: trader-eth

  trader-btc:
    <<: *trader-common
    profiles: ["btc", "multi"]
    env_file:
      - path: .env
        required: true
      - path: .env.btc
        required: true
    environment:
      <<: *trader-env
      TRADER_ID: trader-btc

  trader-sol:
    <<: *trader-common
    profiles: ["sol", "multi"]
    env_file:
      - path: .env
        required: true
      - path: .env.sol
        required: true
    environment:
      <<: *trader-env
      TRADER_ID: trader-sol

volumes:
  pgdata:
  redisdata:
  grafana_data:
